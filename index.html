<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Tree</title>
    <link rel="stylesheet" href="public/css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="public/fonts/common/fraunces.css">
    <link rel="stylesheet" href="public/css/styles.css?v=17" />
  </head>
  <body>
    <div class="ft-paper"></div>
    <header class="ft-header">
      <div class="ft-header-inner">
        <a class="ft-brand" href="#/dashboard">
          <span class="ft-brand-mark">&#10047;</span>
          <span class="ft-brand-text" data-i18n="brand.title">Family Tree</span>
          <span class="ft-brand-text">v0.9.6</span>
        </a>
          <nav class="ft-nav">
          <a href="#/dashboard" data-match="#/dashboard" data-i18n="nav.dashboard">Dashboard</a>
          <a href="#/people" data-match="#/people" data-i18n="nav.people">People</a>
          <a href="#/tree" data-match="#/tree" data-i18n="nav.tree">Tree</a>
          <a href="#/io" data-match="#/io" data-i18n="nav.io">Import / Export</a>
        </nav>
        <div class="ft-header-tools">
          <input id="ft-quick-search" class="ft-quick-search" type="search" data-i18n-ph="search.placeholder" placeholder="Search people&hellip;" data-i18n-aria="search.placeholder" aria-label="Quick search" />
          <select id="ft-lang" class="ft-lang" data-i18n-aria="lang.label" aria-label="Language"></select>
        </div>
      </div>
    </header>
    <main id="ft-main" class="ft-main"></main>
    <div id="ft-toasts" class="ft-toasts" aria-live="polite"></div>
    <script src="public/js/i18n.js?v=17"></script>
    <script src="public/js/lng/en.js?v=17"></script>
    <script src="public/js/lng/ru.js?v=17"></script>
    <script src="public/js/core.js?v=17"></script>
    <script src="public/js/db.js?v=17"></script>
    <script src="public/js/models.js?v=17"></script>
    <script src="public/js/services/data-service.js?v=17"></script>
    <script src="public/js/services/search-service.js?v=17"></script>
    <script src="public/js/services/tree-service.js?v=17"></script>
    <script src="public/js/services/story-service.js?v=17"></script>
    <script src="public/js/gedcom-parser.js?v=17"></script>
    <script src="public/js/gedcom-exporter.js?v=17"></script>
    <script src="public/js/tree-renderer.js?v=17"></script>
    <script src="public/js/ui/dashboard.js?v=17"></script>
    <script src="public/js/ui/people.js?v=17"></script>
    <script src="public/js/ui/editor.js?v=17"></script>
    <script src="public/js/ui/tree.js?v=17"></script>
    <script src="public/js/ui/story.js?v=17"></script>
    <script src="public/js/ui/io.js?v=17"></script>
    <script src="public/js/app.js?v=17"></script>
  </body>
</html>
